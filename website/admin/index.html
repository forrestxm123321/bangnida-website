<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Bangnida 后台管理</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div id="app"></div>
<script>
// ============================================
// BANGNIDA 网站后台管理系统 v3.0
// ============================================
const APP = {
  // 数据管理
  data: null,
  defaultData: {
    home: { title: 'Precision <em>CNC Machining</em> Services for Global Industries', sub: 'From rapid prototyping to high-volume production.', badges: ['ISO 9001 Certified','Precision Tolerances +/-0.005mm','Fast Turnaround 3-15 Days'], stats: ['15+','200+','5,000+','98%'] },
    services: [{id:1,t:'CNC Milling',d:'3/4/5-axis CNC milling.'},{id:2,t:'CNC Turning',d:'High-precision turning.'},{id:3,t:'5-Axis Machining',d:'Advanced 5-axis.'},{id:4,t:'Swiss Machining',d:'Ultra-precision.'},{id:5,t:'Surface Finishing',d:'Various finishes.'}],
    whyus: [{t:'ISO 9001:2015',d:'Quality management.'},{t:'Precision',d:'+/-0.005mm.'},{t:'Fast',d:'3 days.'},{t:'Cost',d:'Factory pricing.'},{t:'Materials',d:'50+ options.'},{t:'Support',d:'Free DFM.'}],
    equip: [{n:'5-Axis Centers',v:'12'},{n:'4-Axis Mills',v:'28'},{n:'3-Axis Mills',v:'55'},{n:'Swiss Lathes',v:'18'},{n:'Turning Centers',v:'35'},{n:'EDM',v:'8'},{n:'Grinders',v:'10'},{n:'CMM',v:'6'}],
    steps: [{t:'Upload',d:'Submit CAD files.'},{t:'Quote',d:'24hr response.'},{t:'Make',d:'Precision QC.'},{t:'Ship',d:'Worldwide.'}],
    industries: [{id:1,t:'Aerospace'},{id:2,t:'Automotive'},{id:3,t:'Medical'},{id:4,t:'Industrial'}],
    products: [],
    certs: ['ISO 9001:2015','IATF 16949','ISO 13485','REACH & RoHS'],
    faq: [{id:1,q:'File formats?',a:'STEP IGES STL DXF.'},{id:2,q:'Tolerances?',a:'+/-0.05mm standard.'},{id:3,q:'MOQ?',a:'No minimum.'}],
    about: {desc:'Bangnida is a leading CNC machining manufacturer.',miss:'Quality parts at great prices.'},
    contact: {name:'Bangnida (Zhangzhou) Intelligent Technology Co., Ltd.',addr:'Zhangzhou, Fujian',phone:'+86-596-xxxxxxx',email:'info@bangnida.com'},
    social: {fb:'',tk:'',ig:'',li:''},
    imgs: {}
  },

  init() {
    this.loadData();
    this.buildLogin();
    if (localStorage.getItem('bn_admin')) this.showApp();
    else this.showLogin();
  },

  loadData() {
    try { const d = localStorage.getItem('bn_data'); if (d) { this.data = JSON.parse(d); return; } } catch(e) {}
    this.data = JSON.parse(JSON.stringify(this.defaultData));
  },

  save() { localStorage.setItem('bn_data', JSON.stringify(this.data)); },

  // ---- 登录 ----
  buildLogin() {
    this.app.innerHTML = `<div id="loginPage" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a3d7a,#1a5a9e);width:100%">
    <div style="background:#fff;border-radius:16px;padding:48px 40px;width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <h1 style="color:#0a3d7a;font-size:24px;margin-bottom:4px">Bangnida</h1>
    <p style="color:#888;font-size:14px;margin-bottom:28px">网站后台管理系统</p>
    <input type="text" id="loginUser" value="admin" style="width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:8px;margin-bottom:14px;outline:none">
    <input type="password" id="loginPass" value="bangnida2026" style="width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:8px;margin-bottom:20px;outline:none">
    <button onclick="APP.login()" style="width:100%;padding:13px;background:#0a3d7a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:15px">登录</button>
    <div id="loginErr" style="color:#e74c3c;margin-top:12px;display:none">用户名或密码错误</div>
    <p style="color:#999;font-size:11px;margin-top:24px">邦尼达（漳州）智能科技有限公司</p></div></div>`;
    document.addEventListener('keydown', e => { if (e.key === 'Enter') this.login(); });
  },

  login() {
    if (document.getElementById('loginUser').value === 'admin' && document.getElementById('loginPass').value === 'bangnida2026') {
      localStorage.setItem('bn_admin', '1');
      this.showApp();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  },

  showLogin() { document.getElementById('loginPage').style.display = 'flex'; },

  showApp() {
    const p = document.getElementById('loginPage');
    if (p) p.style.display = 'none';
    this.buildApp();
  },

  // ---- 构建应用 ----
  buildApp() {
    this.app.innerHTML = this.layout();
    this.renderMenu();
    this.switchPage('dashboard');
  },

  layout() {
    return `<div style="display:flex;min-height:100vh;font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5">
    <!-- 侧边栏 -->
    <div style="width:220px;background:#1a1d29;color:#aaa;position:fixed;left:0;top:0;height:100vh;display:flex;flex-direction:column;z-index:100;font-size:14px">
      <div style="padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.06)">
        <div style="color:#fff;font-size:16px;font-weight:700">Bangnida</div>
        <div style="color:#e67e22;font-size:10px;margin-top:2px">邦尼达（漳州）智能科技有限公司</div>
      </div>
      <div id="menuContainer" style="flex:1;padding:8px 0;overflow-y:auto"></div>
      <div style="border-top:1px solid rgba(255,255,255,.04);padding:12px 16px;font-size:11px;color:rgba(255,255,255,.15);text-align:center">技术支持：厦门岂胜科技有限公司</div>
    </div>
    <!-- 主内容 -->
    <div style="margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh">
      <div style="background:#fff;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:50">
        <h3 id="pageTitle" style="font-size:16px;color:#0a3d7a;margin:0">控制台</h3>
        <div style="display:flex;align-items:center;gap:16px;font-size:13px;color:#888">
          <a href="javascript:APP.preview()" style="color:#0a3d7a;text-decoration:none;background:#e8f0fe;padding:6px 14px;border-radius:6px"><i class="fas fa-eye"></i> 预览</a>
          <button onclick="APP.logout()" style="background:none;border:none;color:#999;cursor:pointer;padding:4px 10px;border-radius:4px"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
      </div>
      <div id="pageContent" style="padding:24px 28px;flex:1"></div>
    </div></div>`;
  },

  preview() { window.open('/preview.html', '_blank'); },
  logout() { localStorage.removeItem('bn_admin'); this.app.innerHTML = ''; this.buildLogin(); this.showLogin(); },

  // ---- 菜单 ----
  menus: [
    {id:'dashboard', icon:'fa-chart-simple', label:'控制台'},
    {id:'home', icon:'fa-home', label:'首页设置'},
    {id:'images', icon:'fa-image', label:'图片管理'},
    {id:'services', icon:'fa-tools', label:'服务管理'},
    {id:'whyus', icon:'fa-star', label:'为什么选择我们'},
    {id:'equip', icon:'fa-microchip', label:'设备管理'},
    {id:'steps', icon:'fa-sitemap', label:'流程管理'},
    {id:'industries', icon:'fa-industry', label:'行业管理'},
    {id:'products', icon:'fa-boxes', label:'产品案例'},
    {id:'certs', icon:'fa-certificate', label:'认证管理'},
    {id:'about', icon:'fa-file-lines', label:'关于我们'},
    {id:'faq', icon:'fa-question', label:'FAQ管理'},
    {id:'contact', icon:'fa-address-book', label:'联系信息'},
    {id:'settings', icon:'fa-gear', label:'系统设置'}
  ],

  renderMenu() {
    const el = document.getElementById('menuContainer');
    let h = '';
    this.menus.forEach(m => {
      h += `<div class="menu-item" data-page="${m.id}" onclick="APP.switchPage('${m.id}')" style="display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;transition:.2s;border-left:3px solid transparent;color:#aaa">
        <i class="fas ${m.icon}" style="width:18px;text-align:center"></i><span>${m.label}</span>
      </div>`;
    });
    el.innerHTML = h;
  },

  switchPage(id) {
    document.querySelectorAll('.menu-item').forEach(el => {
      if (el.dataset.page === id) {
        el.style.background = 'rgba(10,61,122,.3)';
        el.style.color = '#fff';
        el.style.borderLeftColor = '#e67e22';
      } else {
        el.style.background = '';
        el.style.color = '#aaa';
        el.style.borderLeftColor = 'transparent';
      }
    });
    const titles = {dashboard:'控制台',home:'首页设置',images:'图片管理',services:'服务管理',whyus:'为什么选择我们',equip:'设备管理',steps:'流程管理',industries:'行业管理',products:'产品案例',certs:'认证管理',about:'关于我们',faq:'FAQ管理',contact:'联系信息',settings:'系统设置'};
    document.getElementById('pageTitle').textContent = titles[id] || id;
    const fns = {
      dashboard: () => this.renderDashboard(),
      home: () => this.renderHome(),
      images: () => this.renderImages(),
      services: () => this.renderTable('services','服务',['标题','描述']),
      whyus: () => this.renderList('whyus',6,'为什么选择我们'),
      equip: () => this.renderList('equip',8,'设备管理'),
      steps: () => this.renderList('steps',4,'流程管理'),
      industries: () => this.renderTable('industries','行业',['标题']),
      products: () => this.renderTable('products','产品',['名称','分类']),
      certs: () => this.renderCerts(),
      about: () => this.renderAbout(),
      faq: () => this.renderTable('faq','FAQ',['问题','答案']),
      contact: () => this.renderContact(),
      settings: () => this.renderSettings()
    };
    if (fns[id]) fns[id]();
  },

  // ---- 卡片组件 ----
  card(title, content) {
    return `<div style="background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:20px;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid #eee;font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center">${title}</div>
      <div style="padding:20px">${content}</div>
    </div>`;
  },

  btn(text, cls, onclick) {
    const styles = {p:'background:#0a3d7a;color:#fff',o:'background:#e67e22;color:#fff',d:'background:#e74c3c;color:#fff',out:'background:transparent;border:2px solid #0a3d7a;color:#0a3d7a'};
    const s = styles[cls] || styles.p;
    return `<button style="display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;${s}" onclick="${onclick}">${text}</button>`;
  },

  input(id, val) { return `<input id="${id}" value="${this.esc(val||'')}" style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;font-family:inherit">`; },
  textarea(id, val) { return `<textarea id="${id}" style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;font-family:inherit;min-height:80px;resize:vertical">${this.esc(val||'')}</textarea>`; },
  esc(s) { return String(s||'').replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m}) },
  msg(m,t){const d=document.createElement('div');d.style.cssText='position:fixed;top:20px;right:20px;z-index:9999;padding:12px 28px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;'+(t==='err'?'background:#e74c3c':'background:#27ae60');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)},

  // ---- 控制台 ----
  renderDashboard() {
    const d = this.data;
    document.getElementById('pageContent').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      ${[
        ['fa-file-lines','页面总数','22','#e8f0fe','#0a3d7a'],
        ['fa-tools','服务数',d.services.length,'#fef5e7','#e67e22'],
        ['fa-boxes','产品数',d.products.length,'#e8f8f0','#27ae60'],
        ['fa-industry','行业数',d.industries.length,'#fce4ec','#e74c3c']
      ].map(s=>`<div style="background:#fff;border-radius:10px;padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)">
        <div style="width:50px;height:50px;border-radius:12px;background:${s[3]};display:flex;align-items:center;justify-content:center;color:${s[4]};font-size:24px"><i class="fas ${s[0]}"></i></div>
        <div><div style="font-size:24px;font-weight:700">${s[2]}</div><div style="font-size:13px;color:#888">${s[1]}</div></div></div>`).join('')}
    </div>
    ${this.card('<i class="fas fa-bolt" style="color:#e67e22"></i> 快捷操作', `
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${this.btn('编辑首页','p','APP.switchPage(\'home\')')}
        ${this.btn('上传图片','o','APP.switchPage(\'images\')')}
        ${this.btn('管理服务','out','APP.switchPage(\'services\')')}
        ${this.btn('管理产品','out','APP.switchPage(\'products\')')}
        ${this.btn('导出数据','out','APP.switchPage(\'settings\')')}
      </div>`)}
    ${this.card('<i class="fas fa-info-circle"></i> 网站信息',`
      <p style="font-size:13px;color:#555">Bangnida (Zhangzhou) Intelligent Technology Co., Ltd.</p>
      <p style="font-size:13px;color:#888;margin-top:4px">邦尼达（漳州）智能科技有限公司</p>
      <p style="font-size:13px;color:#888;margin-top:4px">技术支持：厦门岂胜科技有限公司 (Xiamen Questic Tech Co., Ltd.)</p>`)}`;
  },

  // ---- 首页设置 ----
  renderHome() {
    const h = this.data.home;
    document.getElementById('pageContent').innerHTML = this.card('首页内容', `
      <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">主标题</label>${this.input('hpT',h.title)}</div>
      <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">副标题</label>${this.textarea('hpS',h.sub)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px">
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">徽章1</label>${this.input('hpB1',h.badges[0])}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">徽章2</label>${this.input('hpB2',h.badges[1])}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">徽章3</label>${this.input('hpB3',h.badges[2])}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px">
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">统计1</label>${this.input('hpS1',h.stats[0])}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">统计2</label>${this.input('hpS2',h.stats[1])}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">统计3</label>${this.input('hpS3',h.stats[2])}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">统计4</label>${this.input('hpS4',h.stats[3])}</div>
      </div>
      ${this.btn('保存','p','APP.saveHome()')}`);
  },

  saveHome() {
    const h = this.data.home;
    h.title = document.getElementById('hpT').value.trim();
    h.sub = document.getElementById('hpS').value.trim();
    h.badges = [this.gv('hpB1'), this.gv('hpB2'), this.gv('hpB3')].filter(Boolean);
    h.stats = [this.gv('hpS1'), this.gv('hpS2'), this.gv('hpS3'), this.gv('hpS4')].filter(Boolean);
    this.save(); this.msg('首页设置已保存');
  },
  gv(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; },

  // ---- 图片管理 ----
  renderImages() {
    const imgs = this.data.imgs || {};
    const keys = [
      {k:'logo',l:'Logo',f:'/assets/images/logo.svg'},
      {k:'b1',l:'轮播图1',f:'/assets/images/banner-precision.svg'},
      {k:'b2',l:'轮播图2',f:'/assets/images/banner-facility.svg'},
      {k:'b3',l:'轮播图3',f:'/assets/images/banner-quality.svg'}
    ];
    let cards = '';
    keys.forEach(k => {
      const img = imgs[k.k] || {};
      const src = img.data || k.f;
      cards += `<div style="border:2px dashed #ddd;border-radius:10px;padding:18px;margin-bottom:12px;background:#fafafa">
        <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
          <div style="width:140px;height:60px;background:#fff;border-radius:6px;border:1px solid #eee;display:flex;align-items:center;justify-content:center;overflow:hidden">
            <img src="${src}" style="max-width:130px;max-height:54px;object-fit:contain">
          </div>
          <div>
            <div style="font-weight:600;margin-bottom:6px">${k.l}</div>
            <input type="file" accept="image/*" onchange="APP.upload('${k.k}',this)" style="font-size:12px;display:block">
            ${img.data ? `<button onclick="APP.clearImg('${k.k}')" style="margin-top:6px;padding:4px 12px;background:#e74c3c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">清除</button>` : ''}
          </div>
        </div>
      </div>`;
    });
    document.getElementById('pageContent').innerHTML = this.card('图片上传', `
      <p style="font-size:13px;color:#888;margin-bottom:16px">上传后点击右上角「预览」查看效果。</p>
      ${cards}`);
  },

  upload(k, input) {
    const f = input.files[0]; if (!f) return;
    if (f.size > 10*1024*1024) { this.msg('图片超过10MB','err'); input.value = ''; return; }
    const r = new FileReader();
    r.onload = e => {
      if (!this.data.imgs) this.data.imgs = {};
      this.data.imgs[k] = { data: e.target.result, name: f.name };
      this.save();
      this.renderImages();
      this.msg('上传成功');
    };
    r.readAsDataURL(f);
  },

  clearImg(k) {
    if (!confirm('确定清除？')) return;
    if (this.data.imgs) delete this.data.imgs[k];
    this.save();
    this.renderImages();
    this.msg('已清除','err');
  },

  // ---- 表格 CRUD (服务/行业/产品/FAQ) ----
  tableData(key) { return this.data[key] || []; },

  renderTable(key, label, fields) {
    const items = this.tableData(key);
    const colNames = {services:['标题','描述'],industries:['标题'],products:['名称','分类'],faq:['问题','答案']};
    const cols = colNames[key] || fields;
    let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;color:#0a3d7a;margin:0">${label}管理</h3>${this.btn('添加','p',`APP.showModal('${key}')`)}</div>`;
    if (!items.length) {
      h += `<div style="text-align:center;padding:40px;color:#aaa"><i class="fas fa-inbox" style="font-size:48px;display:block;margin-bottom:12px;opacity:.3"></i><p>暂无${label}</p></div>`;
    } else {
      h += `<div style="overflow-x:auto;background:#fff;border-radius:8px;border:1px solid #eee">
      <table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>`;
      cols.forEach(c => { h += `<th style="text-align:left;padding:12px 14px;background:#f8f9fb;font-weight:600;color:#555;border-bottom:2px solid #eee">${c}</th>`; });
      h += `<th style="width:90px;background:#f8f9fb;border-bottom:2px solid #eee">操作</th></tr></thead><tbody>`;
      items.forEach((s,i) => {
        h += '<tr>';
        if (key === 'services') h += `<td style="padding:10px 14px;border-bottom:1px solid #eee"><strong>${this.esc(s.t||'')}</strong></td><td style="padding:10px 14px;border-bottom:1px solid #eee">${this.esc((s.d||'').substring(0,60))}</td>`;
        else if (key === 'industries') h += `<td style="padding:10px 14px;border-bottom:1px solid #eee"><strong>${this.esc(s.t||'')}</strong></td>`;
        else if (key === 'products') h += `<td style="padding:10px 14px;border-bottom:1px solid #eee"><strong>${this.esc(s.t||'')}</strong></td><td style="padding:10px 14px;border-bottom:1px solid #eee">${this.esc(s.c||'')}</td>`;
        else if (key === 'faq') h += `<td style="padding:10px 14px;border-bottom:1px solid #eee"><strong>${this.esc(s.q||'')}</strong></td><td style="padding:10px 14px;border-bottom:1px solid #eee">${this.esc((s.a||'').substring(0,40))}</td>`;
        h += `<td style="padding:10px 14px;border-bottom:1px solid #eee">
          <button onclick="APP.editModal('${key}',${s.id})" style="padding:4px 10px;background:#0a3d7a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px"><i class="fas fa-pen"></i></button>
          <button onclick="APP.delItem('${key}',${s.id})" style="padding:4px 10px;background:#e74c3c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-left:4px"><i class="fas fa-trash"></i></button>
        </td></tr>`;
      });
      h += '</tbody></table></div>';
    }
    document.getElementById('pageContent').innerHTML = this.card(`<i class="fas fa-list"></i> ${label}管理`, h);
  },

  showModal(key) { this.editModal(key, 0); },

  editModal(key, id) {
    const items = this.tableData(key);
    const s = id ? items.find(x => x.id === id) : null;
    let fields = [];
    if (key === 'services') fields = [{id:'mT',l:'标题',v:s?s.t:''},{id:'mD',l:'描述',v:s?s.d:''}];
    else if (key === 'industries') fields = [{id:'mT',l:'标题',v:s?s.t:''}];
    else if (key === 'products') fields = [{id:'mT',l:'名称',v:s?s.t:''},{id:'mC',l:'分类',v:s?s.c:''}];
    else if (key === 'faq') fields = [{id:'mQ',l:'问题',v:s?s.q:''},{id:'mA',l:'答案',v:s?s.a:''}];
    let html = `<div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)APP.closeModal()">
      <div style="background:#fff;border-radius:12px;padding:28px;width:520px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2)">
        <h3 style="font-size:17px;color:#0a3d7a;margin-bottom:18px">${id?'编辑':'添加'}</h3>`;
    fields.forEach(f => {
      html += `<div style="margin-bottom:14px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">${f.l}</label><input id="${f.id}" value="${this.esc(f.v)}" style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none"></div>`;
    });
    html += `<div style="display:flex;gap:10px;margin-top:20px">
      <button onclick="APP.saveModal('${key}',${id||0})" style="flex:1;padding:10px;background:#0a3d7a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600">保存</button>
      <button onclick="APP.closeModal()" style="flex:1;padding:10px;background:transparent;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;font-weight:600">取消</button>
    </div></div></div>`;
    const d = document.createElement('div'); d.id = 'modal'; d.innerHTML = html;
    document.body.appendChild(d);
  },

  saveModal(key, id) {
    const items = this.tableData(key);
    if (key === 'services') { const t = document.getElementById('mT').value.trim(); if (!t) return; const o = {t, d: document.getElementById('mD').value.trim()}; if (id) { const s = items.find(x => x.id === id); if (s) Object.assign(s, o); } else items.push({id:Date.now(), ...o}); }
    else if (key === 'industries') { const t = document.getElementById('mT').value.trim(); if (!t) return; if (id) { const s = items.find(x => x.id === id); if (s) s.t = t; } else items.push({id:Date.now(), t}); }
    else if (key === 'products') { const t = document.getElementById('mT').value.trim(); if (!t) return; const o = {t, c: document.getElementById('mC').value.trim()}; if (id) { const s = items.find(x => x.id === id); if (s) Object.assign(s, o); } else items.push({id:Date.now(), ...o}); }
    else if (key === 'faq') { const q = document.getElementById('mQ').value.trim(); if (!q) return; const o = {q, a: document.getElementById('mA').value.trim()}; if (id) { const s = items.find(x => x.id === id); if (s) Object.assign(s, o); } else items.push({id:Date.now(), ...o}); }
    this.save(); this.closeModal(); this.switchPage(key); this.msg('已保存');
  },

  delItem(key, id) {
    if (!confirm('确定删除？')) return;
    this.data[key] = this.data[key].filter(s => s.id !== id);
    this.save();
    this.switchPage(key);
    this.msg('已删除','err');
  },

  closeModal() { const m = document.getElementById('modal'); if (m) m.remove(); },

  // ---- 列表编辑器 (Why Us, Equipment, Steps) ----
  renderList(key, count, title) {
    const items = this.data[key] || [];
    let h = '';
    for (let i = 0; i < count; i++) {
      const it = items[i] || {};
      const v1 = it.t || it.n || '';
      const v2 = it.d || it.v || '';
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#f8f9fb;padding:14px;border-radius:8px;margin-bottom:8px">
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">${title==='设备管理'?'名称':'标题'}</label>${this.input(key+'T'+i, v1)}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">${title==='设备管理'?'数量':'描述'}</label>${this.input(key+'D'+i, v2)}</div>
      </div>`;
    }
    document.getElementById('pageContent').innerHTML = this.card(`<i class="fas fa-pen"></i> ${title}`, h + '<br>' + this.btn('保存','p','APP.saveList(\''+key+'\',\''+count+'\',\''+title+'\')'));
  },

  saveList(key, count, title) {
    const arr = [];
    for (let i = 0; i < count; i++) {
      const t = document.getElementById(key+'T'+i);
      const d = document.getElementById(key+'D'+i);
      if (t && t.value.trim()) arr.push({t: t.value.trim(), d: d ? d.value.trim() : ''});
    }
    if (key === 'whyus') this.data.whyus = arr;
    else if (key === 'equip') this.data.equip = arr.map(a => ({n: a.t, v: a.d}));
    else if (key === 'steps') this.data.steps = arr;
    this.save(); this.msg('已保存');
  },

  // ---- 认证管理 ----
  renderCerts() {
    const items = this.data.certs || [];
    let h = '';
    for (let i = 0; i < 4; i++) {
      h += `<div style="margin-bottom:14px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">认证${i+1}</label>${this.input('c'+i, items[i]||'')}</div>`;
    }
    document.getElementById('pageContent').innerHTML = this.card('认证管理', h + this.btn('保存','p','APP.saveCerts()'));
  },

  saveCerts() {
    const arr = [];
    for (let i = 0; i < 4; i++) { const v = document.getElementById('c'+i); if (v && v.value.trim()) arr.push(v.value.trim()); }
    this.data.certs = arr; this.save(); this.msg('已保存');
  },

  // ---- 关于我们 ----
  renderAbout() {
    const a = this.data.about;
    document.getElementById('pageContent').innerHTML = this.card('关于我们', `
      <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">公司描述</label>${this.textarea('abD',a.desc)}</div>
      <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">公司使命</label>${this.textarea('abM',a.miss)}</div>
      ${this.btn('保存','p','APP.saveAbout()')}`);
  },

  saveAbout() {
    this.data.about.desc = document.getElementById('abD').value.trim();
    this.data.about.miss = document.getElementById('abM').value.trim();
    this.save(); this.msg('已保存');
  },

  // ---- 联系信息 ----
  renderContact() {
    const c = this.data.contact;
    document.getElementById('pageContent').innerHTML = this.card('联系信息', `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">公司名称</label>${this.input('cN',c.name)}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">地址</label>${this.input('cA',c.addr)}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">电话</label>${this.input('cP',c.phone)}</div>
        <div><label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">邮箱</label>${this.input('cE',c.email)}</div>
      </div>
      ${this.btn('保存','p','APP.saveContact()')}`);
  },

  saveContact() {
    this.data.contact.name = document.getElementById('cN').value.trim();
    this.data.contact.addr = document.getElementById('cA').value.trim();
    this.data.contact.phone = document.getElementById('cP').value.trim();
    this.data.contact.email = document.getElementById('cE').value.trim();
    this.save(); this.msg('已保存');
  },

  // ---- 系统设置 ----
  renderSettings() {
    document.getElementById('pageContent').innerHTML = this.card('数据管理', `
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        ${this.btn('导出数据','p','APP.exportData()')}
        <button onclick="document.getElementById('impF').click()" style="display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:transparent;border:2px solid #0a3d7a;color:#0a3d7a"><i class="fas fa-upload"></i> 导入数据</button>
        <input type="file" id="impF" accept=".json" style="display:none" onchange="APP.importData(event)">
        ${this.btn('恢复默认','d','APP.resetData()')}
      </div>
      <p style="font-size:13px;color:#888">Bangnida (Zhangzhou) Intelligent Technology Co., Ltd. ｜ 邦尼达（漳州）智能科技有限公司</p>
      <p style="font-size:13px;color:#888;margin-top:4px">技术支持：厦门岂胜科技有限公司</p>`);
  },

  exportData() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(this.data, null, 2)], {type: 'application/json'}));
    a.download = 'bangnida-data.json'; a.click(); this.msg('数据已导出');
  },

  importData(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => { try { Object.assign(this.data, JSON.parse(ev.target.result)); this.save(); this.msg('导入成功'); this.switchPage('dashboard'); } catch(ex) { this.msg('导入失败','err'); } };
    r.readAsText(f); e.target.value = '';
  },

  resetData() {
    if (!confirm('确定恢复默认设置？所有数据将丢失！')) return;
    this.data = JSON.parse(JSON.stringify(this.defaultData));
    this.save(); this.msg('已恢复默认'); this.switchPage('dashboard');
  }
};

// ---- 启动 ----
APP.app = document.getElementById('app');
APP.init();
</script>
</body>
</html>
