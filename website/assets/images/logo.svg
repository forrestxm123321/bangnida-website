<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3d7a"/>
      <stop offset="100%" stop-color="#1a5bb5"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
  </defs>

  <!-- Gear ring -->
  <path d="M 50 8 L 54 18 L 64 16 L 66 26 L 76 30 L 72 40 L 80 48 L 72 56 L 76 66 L 66 70 L 64 80 L 54 78 L 50 88 L 46 78 L 36 80 L 34 70 L 24 66 L 28 56 L 20 48 L 28 40 L 24 30 L 34 26 L 36 16 L 46 18 Z"
