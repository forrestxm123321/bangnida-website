<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="blueprint" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none" stroke="#0a3d7a" stroke-width="0.3" opacity="0.04"/>
      <line x1="0" y1="0" x2="80" y2="80" stroke="#0a3d7a" stroke-width="0.15" opacity="0.03"/>
      <line x1="80" y1="0" x2="0" y2="80" stroke="#0a3d7a" stroke-width="0.15" opacity="0.03"/>
    </pattern>
    <pattern id="cogs" width="140" height="140" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#e67e22" opacity="0.03">
        <rect x="10" y="10" width="50" height="50" rx="5" stroke-width="0.5"/>
        <circle cx="35" cy="35" r="12" stroke-width="0.3"/>
        <rect x="80" y="80" width="50" height="50" rx="5" stroke-width="0.4"/>
        <circle cx="105" cy="105" r="10" stroke-width="0.3"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#blueprint)"/>
  <rect width="400" height="400" fill="url(#cogs)"/>
</svg>
