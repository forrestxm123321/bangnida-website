    <circle cx="70" cy="66" r="22" fill="#fff"/>
    <circle cx="70" cy="66" r="10" fill="url(#accentG)"/>
    <rect x="66" y="0" width="8" height="16" rx="3" fill="url(#accentG)"/>
  </g>
  <!-- Company Name -->
  <text x="170" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" fill="#fff" letter-spacing="3">BANGNIDA</text>
