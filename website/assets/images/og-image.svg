      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="50%" stop-color="#0d2b4e"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Gear icon -->
  <g transform="translate(80, 80)">
    <path d="M 70 10 L 76 24 L 90 22 L 93 36 L 106 42 L 102 56 L 112 66 L 102 76 L 106 90 L 93 96 L 90 110 L 76 108 L 70 122 L 64 108 L 50 110 L 47 96 L 34 90 L 38 76 L 28 66 L 38 56 L 34 42 L 47 36 L 50 22 L 64 24 Z"
