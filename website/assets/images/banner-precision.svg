<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="40%" stop-color="#0d2b4e"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(10,25,41,0.85)"/>
      <stop offset="60%" stop-color="rgba(10,25,41,0.3)"/>
      <stop offset="100%" stop-color="rgba(10,25,41,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#bg1)"/>
  <rect width="1920" height="800" fill="url(#overlay)"/>

  <!-- CNC machine silhouette lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none">
    <rect x="200" y="100" width="600" height="500" rx="20"/>
    <rect x="220" y="120" width="200" height="200" rx="8"/>
    <rect x="440" y="120" width="200" height="200" rx="8"/>
    <rect x="220" y="340" width="420" height="240" rx="8"/>
    <circle cx="320" cy="460" r="60"/>
    <circle cx="540" cy="460" r="60"/>
  </g>

  <!-- Abstract gear elements -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="1500" cy="200" r="180"/>
    <circle cx="1700" cy="500" r="120"/>
    <circle cx="1400" cy="650" r="80"/>
  </g>

  <!-- Cutting path lines -->
  <path d="M 400 200 Q 600 150 800 250 T 1200 200" stroke="rgba(230,126,34,0.12)" stroke-width="3" fill="none"/>
  <path d="M 300 350 Q 500 300 700 400 T 1100 350" stroke="rgba(230,126,34,0.08)" stroke-width="2" fill="none"/>
</svg>
