<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c5ce"/>
      <stop offset="50%" stop-color="#e0e5ec"/>
      <stop offset="100%" stop-color="#a0a5ae"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a8f99"/>
      <stop offset="100%" stop-color="#6a6f79"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f2f5"/>
      <stop offset="100%" stop-color="#e0e4ea"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="arithmetic" k1="0" k2="1" k3="-1" k4="0"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#999">AIRCRAFT ENGINE MOUNTING BRACKET — 7075-T6 ALUMINUM</text>

  <!-- Main bracket body -->
  <g filter="url(#shadow)">
    <path d="M 150 180 L 400 180 L 400 160 L 480 160 L 480 260 L 580 260 L 580 360 L 480 360 L 480 440 L 400 440 L 400 380 L 150 380 Z"
          fill="url(#metal)" stroke="#7a7f89" stroke-width="2"/>

    <!-- Inner cutout -->
    <path d="M 200 220 L 350 220 L 350 340 L 200 340 Z"
          fill="url(#bgGrad)" stroke="#7a7f89" stroke-width="1.5" stroke-dasharray="6,3"/>

    <!-- Rib features -->
    <rect x="370" y="190" width="12" height="160" rx="2" fill="url(#metalDark)" opacity="0.4"/>
    <rect x="150" y="280" width="200" height="12" rx="2" fill="url(#metalDark)" opacity="0.3"/>
  </g>

  <!-- Mounting holes -->
  <circle cx="200" cy="280" r="18" fill="url(#bgGrad)" stroke="#7a7f89" stroke-width="2"/>
  <circle cx="200" cy="280" r="8" fill="#6a6f79"/>
  <circle cx="300" cy="280" r="18" fill="url(#bgGrad)" stroke="#7a7f89" stroke-width="2"/>
  <circle cx="300" cy="280" r="8" fill="#6a6f79"/>
  <circle cx="200" cy="170" r="10" fill="url(#bgGrad)" stroke="#7a7f89" stroke-width="1.5"/>
  <circle cx="200" cy="170" r="4" fill="#6a6f79"/>

  <!-- Edge flange detail -->
  <rect x="145" y="175" width="8" height="210" rx="2" fill="url(#metalDark)" opacity="0.5"/>

  <!-- Dimension lines -->
  <line x1="100" y1="180" x2="100" y2="440" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="95" y1="180" x2="130" y2="180" stroke="#e67e22" stroke-width="0.8"/>
  <line x1="95" y1="440" x2="130" y2="440" stroke="#e67e22" stroke-width="0.8"/>
  <text x="90" y="320" text-anchor="middle" transform="rotate(-90,90,320)" font-family="monospace" font-size="11" fill="#e67e22">260.0 mm</text>

  <line x1="150" y1="470" x2="480" y2="470" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="150" y1="465" x2="150" y2="485" stroke="#e67e22" stroke-width="0.8"/>
  <line x1="480" y1="465" x2="480" y2="485" stroke="#e67e22" stroke-width="0.8"/>
  <text x="315" y="485" text-anchor="middle" font-family="monospace" font-size="11" fill="#e67e22">330.0 mm</text>

  <!-- Tolerance callout -->
  <text x="580" y="160" font-family="monospace" font-size="11" fill="#e67e22">Ø 12.0 H7</text>
  <text x="520" y="175" font-family="monospace" font-size="11" fill="#e67e22">|-- 4x Ø 16.0 ±0.01</text>

  <!-- Material note -->
  <rect x="550" y="480" width="220" height="90" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" opacity="0.9"/>
  <text x="560" y="500" font-family="monospace" font-size="11" fill="#333" font-weight="bold">MATERIAL:</text>
  <text x="630" y="500" font-family="monospace" font-size="11" fill="#666">7075-T6 Aluminum</text>
  <text x="560" y="518" font-family="monospace" font-size="11" fill="#333" font-weight="bold">FINISH:</text>
  <text x="616" y="518" font-family="monospace" font-size="11" fill="#666">Hard Anodized Type III</text>
  <text x="560" y="536" font-family="monospace" font-size="11" fill="#333" font-weight="bold">TOLERANCE:</text>
  <text x="640" y="536" font-family="monospace" font-size="11" fill="#666">±0.01 mm</text>
  <text x="560" y="554" font-family="monospace" font-size="11" fill="#333" font-weight="bold">PROCESS:</text>
  <text x="624" y="554" font-family="monospace" font-size="11" fill="#666">5-Axis CNC Milling</text>
</svg>
