<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="alu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8bcc4"/>
      <stop offset="50%" stop-color="#d8dce4"/>
      <stop offset="100%" stop-color="#989ca4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f2f5"/>
      <stop offset="100%" stop-color="#e0e4ea"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="3" dy="5" stdDeviation="8" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#999">ENGINE CYLINDER HEAD PROTOTYPE — 6061-T6 ALUMINUM</text>

  <g filter="url(#shadow)">
    <!-- Main block -->
    <rect x="140" y="140" width="520" height="320" rx="12" fill="url(#alu)" stroke="#7a7e86" stroke-width="2"/>

    <!-- Combustion chamber pockets -->
    <ellipse cx="260" cy="240" rx="50" ry="55" fill="#7a7e86" opacity="0.3"/>
    <ellipse cx="260" cy="240" rx="35" ry="40" fill="#6a6e76" opacity="0.2"/>
    <ellipse cx="540" cy="240" rx="50" ry="55" fill="#7a7e86" opacity="0.3"/>
    <ellipse cx="540" cy="240" rx="35" ry="40" fill="#6a6e76" opacity="0.2"/>

    <!-- Valve guide holes -->
    <circle cx="230" cy="200" r="8" fill="#6a6e76"/>
    <circle cx="290" cy="200" r="8" fill="#6a6e76"/>
    <circle cx="230" cy="280" r="8" fill="#6a6e76"/>
    <circle cx="290" cy="280" r="8" fill="#6a6e76"/>
    <circle cx="510" cy="200" r="8" fill="#6a6e76"/>
    <circle cx="570" cy="200" r="8" fill="#6a6e76"/>
    <circle cx="510" cy="280" r="8" fill="#6a6e76"/>
    <circle cx="570" cy="280" r="8" fill="#6a6e76"/>

    <!-- Spark plug holes -->
    <circle cx="260" cy="240" r="12" fill="#4a4e56" stroke="#6a6e76" stroke-width="1.5"/>
    <circle cx="540" cy="240" r="12" fill="#4a4e56" stroke="#6a6e76" stroke-width="1.5"/>

    <!-- Water jacket passages -->
    <rect x="180" y="330" width="60" height="20" rx="8" fill="#6a6e76" opacity="0.4"/>
    <rect x="250" y="340" width="80" height="15" rx="6" fill="#6a6e76" opacity="0.4"/>
    <rect x="470" y="330" width="60" height="20" rx="8" fill="#6a6e76" opacity="0.4"/>
    <rect x="470" y="340" width="80" height="15" rx="6" fill="#6a6e76" opacity="0.4"/>

    <!-- Head bolt holes -->
    <circle cx="170" cy="160" r="10" fill="#4a4e56"/>
    <circle cx="630" cy="160" r="10" fill="#4a4e56"/>
    <circle cx="170" cy="430" r="10" fill="#4a4e56"/>
    <circle cx="630" cy="430" r="10" fill="#4a4e56"/>
    <circle cx="400" cy="150" r="10" fill="#4a4e56"/>
    <circle cx="400" cy="440" r="10" fill="#4a4e56"/>

    <!-- Surface texture indicator -->
    <line x1="340" y1="190" x2="380" y2="190" stroke="#e67e22" stroke-width="0.5"/>
    <line x1="345" y1="195" x2="385" y2="195" stroke="#e67e22" stroke-width="0.5"/>
    <line x1="340" y1="200" x2="380" y2="200" stroke="#e67e22" stroke-width="0.5"/>

    <!-- Water jacket callout -->
    <line x1="220" y1="350" x2="160" y2="370" stroke="#e67e22" stroke-width="0.8"/>
    <circle cx="160" cy="370" r="2" fill="#e67e22"/>
    <text x="80" y="374" font-family="monospace" font-size="10" fill="#e67e22">Coolant jacket</text>
  </g>

  <!-- Overall dimension -->
  <line x1="140" y1="490" x2="660" y2="490" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="505" text-anchor="middle" font-family="monospace" font-size="11" fill="#e67e22">520.0 mm (Overall Length)</text>

  <!-- Info panel -->
  <rect x="30" y="520" width="740" height="65" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" opacity="0.9"/>
  <text x="50" y="542" font-family="monospace" font-size="11" fill="#333" font-weight="bold">PROJECT DETAILS:</text>
  <text x="50" y="558" font-family="monospace" font-size="10" fill="#666">Part: 4-Cylinder Engine Cylinder Head Prototype | Material: 6061-T6 Aluminum | Process: 5-Axis CNC Milling | Tolerance: ±0.05 mm | Lead Time: 7 Days (Rapid Prototype)</text>
  <text x="50" y="574" font-family="monospace" font-size="10" fill="#666">Features: Combustion chambers, valve guides, coolant passages, spark plug holes, head bolt holes — all machined in 1 setup</text>
</svg>
