<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#0a3d7a" opacity="0.04"/>
    </pattern>
    <pattern id="flow" width="160" height="160" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#e67e22" opacity="0.03" stroke-linecap="round">
        <path d="M 10 80 Q 40 10 80 80 T 150 80" stroke-width="0.8"/>
        <circle cx="80" cy="80" r="6" stroke-width="0.5" fill="#e67e22" fill-opacity="0.02"/>
        <path d="M 10 140 Q 40 70 80 140 T 150 140" stroke-width="0.6"/>
        <circle cx="80" cy="140" r="4" stroke-width="0.4" fill="#e67e22" fill-opacity="0.02"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#dots)"/>
  <rect width="400" height="400" fill="url(#flow)"/>
</svg>
